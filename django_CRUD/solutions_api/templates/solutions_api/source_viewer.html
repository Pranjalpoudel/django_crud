<!DOCTYPE html>
<html>

<head>
    <title>Source Code Viewer - Pranjal Poudel</title>
    <style>
        body {
            font-family: monospace;
            background: #282c34;
            color: #abb2bf;
            padding: 20px;
        }

        .file-card {
            background: #21252b;
            margin-bottom: 50px;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #3e4451;
        }

        h2 {
            color: #61afef;
            border-bottom: 1px solid #3e4451;
            padding-bottom: 10px;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 14px;
        }

        .path {
            font-size: 12px;
            color: #5c6370;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <h1>Lab Implementation Source Code</h1>
    <p>Submitted by: Pranjal Poudel</p>
    {% for file in files %}
    <div class="file-card" id="{{ file.name|slugify }}">
        <h2>File: {{ file.name }}</h2>
        <div class="path">{{ file.path }}</div>
        <pre>{{ file.content }}</pre>
    </div>
    {% endfor %}
</body>

</html>
